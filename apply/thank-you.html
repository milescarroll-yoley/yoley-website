<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Application received | Yoley</title>
  <meta name="robots" content="noindex, follow">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .ty { min-height:70vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:120px 24px 80px; }
    .ty-card { max-width:520px; }
    .ty-card .ico { font-size:48px; }
    .ty-card h1 { font-size:clamp(26px,4vw,38px); font-weight:900; color:var(--navy); margin:14px 0 12px; }
    .ty-card p { color:var(--dark-text); font-size:17px; line-height:1.6; margin-bottom:24px; }
    .ty-card a { display:inline-block; background:var(--yellow); color:var(--navy); padding:14px 30px; border-radius:100px; font-weight:800; text-decoration:none; }
  </style>
</head>
<body>
  <div class="ty">
    <div class="ty-card">
      <div class="ico">&#9989;</div>
      <h1>Application received</h1>
      <p>Thanks — your application has been sent to Monek. Their team will review it and be in touch to complete your card-payment setup. If you have any questions in the meantime, email <a href="mailto:support@yoley.com" style="background:none;color:var(--teal-dark);padding:0;font-weight:600;">support@yoley.com</a>.</p>
      <a href="../index.html">Back to Yoley</a>
    </div>
  </div>
</body>
</html>
